services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: clubbooking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clubbooking"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  backend:
    build:
      context: .
      dockerfile: ClubBooking.API/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=clubbooking;Username=postgres;Password=postgres123
      - Jwt__Key=SuperSecretKeyForJwtTokenGeneration1234567890
      - Jwt__Issuer=ClubBookingAPI
      - Jwt__Audience=ClubBookingClient
      - AdminSecrets__Admin=Admin123
      - AdminSecrets__SuperAdmin=Super123
    ports:
      - "8080:8080"
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ClubBooking.API/wwwroot:/usr/share/nginx/html
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  pgdata: